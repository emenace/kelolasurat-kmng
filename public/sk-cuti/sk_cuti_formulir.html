<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Cuti</title>
    <style>
        @font-face {
            font-family: 'Arial';
            src: url('../assets/Arial.ttf') format('truetype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #e0e0e0;
            color: #000;
            font-size: 9.5pt;
            line-height: 1.35;
        }

        .page {
            width: 215.9mm;
            min-height: 330.2mm;
            margin: 20px auto;
            padding: 8mm 12mm 10mm 15mm;
            background: #fff;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.18);
            position: relative;
            box-sizing: border-box;
        }

        .no-print {
            text-align: center;
            padding: 16px;
            background: #333;
            color: #fff;
        }

        .no-print button {
            padding: 10px 28px;
            font-size: 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 0 6px;
        }

        .btn-print {
            background: #2196F3;
            color: #fff;
        }

        .btn-back {
            background: #777;
            color: #fff;
        }

        /* Header - left aligned with large left margin to push right */
        .header-block {
            text-align: left;
            margin-left: 52%;
            font-size: 8.5pt;
            line-height: 1.3;
            margin-bottom: 8px;
        }

        /* Address block */
        .address-block {
            text-align: left;
            margin-left: 42%;
            font-size: 9.5pt;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        /* Title */
        .form-title {
            text-align: center;
            font-weight: bold;
            font-size: 10.5pt;
            margin: 6px 0 6px 0;
            text-decoration: underline;
        }

        /* Section tables - each section is its own table */
        .s-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 3px;
            font-size: 9pt;
        }

        .s-table td,
        .s-table th {
            border: 1px solid #000;
            padding: 2px 6px;
            vertical-align: top;
            text-align: left;
        }

        .sec-hdr {
            font-weight: bold;
            padding: 3px 6px !important;
        }

        /* Inner tables (no outer borders, rows have bottom borders) */
        .inner-tbl {
            width: 100%;
            border-collapse: collapse;
        }

        .inner-tbl td {
            border: 1px;
            padding: 1px 4px;
            vertical-align: top;
        }

        /* Inner table with borders (for catatan section) */
        .inner-tbl-bordered {
            width: 100%;
            border-collapse: collapse;
            margin: 1px;
        }

        .inner-tbl-bordered td {
            border: 0.5pt solid #000;
            padding: 2px 6px;
            vertical-align: top;
        }

        /* Catatan */
        .catatan {
            font-size: 7.5pt;
            margin-top: 4px;
            line-height: 1.3;
        }

        .catatan p {
            margin-bottom: 0px;
        }

        /* Print */
        @media print {
            body {
                background: #fff;
            }

            .no-print {
                display: none !important;
            }

            .page {
                width: 100%;
                margin: 0;
                padding: 8mm 12mm 10mm 15mm;
                box-shadow: none;
                min-height: auto;
            }

            @page {
                size: 8.5in 13in;
                margin: 0;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>
    <div id="app">
        <div style="text-align: center; margin-top: 50px; font-family: Arial;">Memuat dokumen...</div>
    </div>
    <script src="sk_cuti_formulir.js"></script>
</body>

</html>
