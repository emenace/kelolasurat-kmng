<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat Tugas - Kemenag Metro</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- Tabulator CSS -->
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        .pegawai-row {
            border: 1px solid #dee2e6;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            background-color: #f8f9fa;
            position: relative;
        }
        .btn-remove-row {
            position: absolute;
            top: 10px;
            right: 10px;
        }
        .autocomplete-results {
            position: absolute;
            z-index: 1000;
            background: white;
            border: 1px solid #ccc;
            max-height: 200px;
            overflow-y: auto;
            width: calc(100% - 30px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .autocomplete-item {
            padding: 8px;
            cursor: pointer;
        }
        .autocomplete-item:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg kemenag-header navbar-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="Kementerian_Agama_new_logo.png" alt="Logo Kemenag" style="height: 40px; margin-right: 10px;">
                <i class="bi bi-arrow-left-circle me-2"></i>
                Kembali
            </a>
            <span class="navbar-text text-white fw-bold">
                Buat Surat Tugas
            </span>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row">
            <!-- Form Section -->
            <div class="col-lg-5 mb-4">
                <div class="card card-form">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <div><i class="bi bi-file-earmark-text me-2"></i>Form Surat Tugas</div>
                        <button class="btn btn-sm btn-outline-secondary d-none" id="btn-cancel-edit">Batal Edit</button>
                    </div>
                    <div class="card-body">
                        <form id="formSuratTugas">
                            <input type="hidden" id="id_surat">
                            
                            <!-- Section 1 -->
                            <h6 class="fw-bold text-success border-bottom pb-2 mb-3">1. Data Surat Tugas</h6>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Nomor Surat</label>
                                    <input type="text" class="form-control" id="surat_nomor" placeholder="Loading..." required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Tanggal Surat</label>
                                    <input type="date" class="form-control" id="surat_tanggal" required>
                                </div>
                            </div>

                            <!-- Section 2 -->
                            <h6 class="fw-bold text-success border-bottom pb-2 mb-3 mt-4">2. Dasar Surat Tugas</h6>
                            <div class="mb-3">
                                <label class="form-label">Pengirim Dasar Surat</label>
                                <input type="text" class="form-control" id="dasar_pengirim" required>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Nomor Dasar Surat</label>
                                    <input type="text" class="form-control" id="dasar_nomor" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Tanggal Dasar Surat</label>
                                    <input type="date" class="form-control" id="dasar_tanggal" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Perihal Dasar Surat</label>
                                <textarea class="form-control" id="dasar_perihal" rows="2" required></textarea>
                            </div>

                            <!-- Section 3 -->
                            <h6 class="fw-bold text-success border-bottom pb-2 mb-3 mt-4">3. Detail Kegiatan</h6>
                            <div class="mb-3">
                                <label class="form-label">Nama Kegiatan</label>
                                <input type="text" class="form-control" id="kegiatan_nama" required>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Hari/Tanggal Kegiatan</label>
                                    <input type="date" class="form-control" id="kegiatan_haritanggal" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Waktu (Jam)</label>
                                    <input type="time" class="form-control" id="kegiatan_waktu" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Tempat Kegiatan</label>
                                <input type="text" class="form-control" id="kegiatan_tempat" required>
                            </div>

                            <!-- Section 4 -->
                            <h6 class="fw-bold text-success border-bottom pb-2 mb-3 mt-4 d-flex justify-content-between align-items-center">
                                <span>4. Pegawai yang Ditugaskan</span>
                                <button type="button" class="btn btn-sm btn-primary" id="btn-tambah-pegawai"><i class="bi bi-plus"></i> Tambah</button>
                            </h6>
                            <div id="pegawai-container">
                                <!-- Dynamic rows go here -->
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-kemenag btn-lg" id="btn-submit">
                                    <i class="bi bi-save me-2"></i>Simpan Surat Tugas
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Table Section -->
            <div class="col-lg-7">
                <div class="card card-form h-100">
                    <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                        <div><i class="bi bi-table me-2"></i>Daftar Surat Tugas</div>
                        <input type="text" id="global-search" class="form-control form-control-sm w-auto" placeholder="Cari data...">
                    </div>
                    <div class="card-body p-0">
                        <div id="table-surat-tugas"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>

    <!-- Page Logic -->
    <script src="surat_tugas.js"></script>
</body>

</html>
