<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat Keluar - Kemenag Metro</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- Tabulator CSS -->
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg kemenag-header navbar-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">
                <img src="../assets/Kementerian_Agama_new_logo.png" alt="Logo Kemenag" style="height: 40px; margin-right: 10px;">
                <i class="bi bi-arrow-left-circle me-2"></i>
                Kembali
            </a>
            <span class="navbar-text text-white fw-bold">
                Pencatatan Surat Keluar
            </span>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row">
            <!-- Form Section -->
            <div class="col-lg-4">
                <div class="card card-form">
                    <div class="card-header">
                        <i class="bi bi-plus-circle me-2"></i>Tambah Data Surat Keluar
                    </div>
                    <div class="card-body">
                        <form id="formSuratKeluar">
                            <input type="hidden" id="id_surat">
                            <div class="mb-3">
                                <label for="nomor_urut" class="form-label">Nomor Urut</label>
                                <input type="number" class="form-control" id="nomor_urut" required>
                            </div>
                            <div class="mb-3">
                                <label for="tanggal_surat" class="form-label">Tanggal Surat</label>
                                <input type="date" class="form-control" id="tanggal_surat" required>
                            </div>
                            <div class="mb-3">
                                <label for="nomor_surat" class="form-label">Nomor Surat</label>
                                <input type="text" class="form-control" id="nomor_surat" required>
                            </div>
                            <div class="mb-3">
                                <label for="asal_surat" class="form-label">Asal Surat</label>
                                <input type="text" class="form-control" id="asal_surat" required>
                            </div>
                            <div class="mb-3">
                                <label for="tujuan" class="form-label">Tujuan</label>
                                <input type="text" class="form-control" id="tujuan" required>
                            </div>
                            <div class="mb-3">
                                <label for="isi_surat" class="form-label">Isi Surat / Perihal</label>
                                <textarea class="form-control" id="isi_surat" rows="2" required></textarea>
                            </div>
                            <div class="mb-4">
                                <label for="keterangan" class="form-label">Keterangan</label>
                                <input type="text" class="form-control" id="keterangan">
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-kemenag btn-lg" id="btn-submit">
                                    <i class="bi bi-save me-2"></i>Simpan Data
                                </button>
                                <button type="button" class="btn btn-secondary d-none" id="btn-cancel-edit">
                                    Batal Edit
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Table Section -->
            <div class="col-lg-8">
                <div class="card card-form h-100">
                    <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                        <div><i class="bi bi-table me-2"></i>Data Surat Keluar</div>
                        <div class="d-flex gap-2 align-items-center">
                            <input type="text" id="global-search" class="form-control form-control-sm"
                                placeholder="Cari data...">
                            <button id="download-pdf" class="btn btn-sm btn-outline-danger text-nowrap">Export
                                PDF</button>
                            <button id="download-xlsx" class="btn btn-sm btn-outline-primary text-nowrap">Export
                                Excel</button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div id="table-surat-keluar"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Tabulator JS -->
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
    <!-- SheetJS for Excel Export -->
    <script type="text/javascript" src="https://oss.sheetjs.com/sheetjs/xlsx.full.min.js"></script>
    <!-- jsPDF and AutoTable for PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <!-- Page Logic -->
    <script src="surat-keluar.js"></script>
</body>

</html>
