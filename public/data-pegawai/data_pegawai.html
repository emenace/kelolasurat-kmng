<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Pegawai - Kemenag Metro</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- Tabulator CSS -->
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg kemenag-header navbar-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">
                <img src="../assets/Kementerian_Agama_new_logo.png" alt="Logo Kemenag" style="height: 40px; margin-right: 10px;">
                <i class="bi bi-arrow-left-circle me-2"></i>
                Kembali
            </a>
            <span class="navbar-text text-white fw-bold">
                Data Pegawai
            </span>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row">
            <!-- Table Section -->
            <div class="col-12">
                <div class="card card-form h-100">
                    <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                        <div><i class="bi bi-people me-2"></i>Daftar Data Pegawai</div>
                        <div class="d-flex gap-2 align-items-center">
                            <input type="text" id="global-search" class="form-control form-control-sm"
                                placeholder="Cari Nama / Jabatan...">
                            <button id="btn-update-data" class="btn btn-sm btn-warning text-nowrap">Update Data</button>
                            <button id="download-pdf" class="btn btn-sm btn-outline-danger text-nowrap">Export PDF</button>
                            <button id="download-xlsx" class="btn btn-sm btn-outline-primary text-nowrap">Export Excel</button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div id="table-pegawai"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Tabulator JS -->
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
    <!-- SheetJS for Excel Export -->
    <script type="text/javascript" src="https://oss.sheetjs.com/sheetjs/xlsx.full.min.js"></script>
    <!-- jsPDF and AutoTable for PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <!-- Page Logic -->
    <script src="data_pegawai.js"></script>
</body>

</html>
