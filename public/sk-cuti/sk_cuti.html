<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK Cuti - Kemenag Metro</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- Tabulator CSS -->
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../style.css">

    <style>
        .pegawai-info {
            border: 1px solid #dee2e6;
            padding: 12px;
            border-radius: 5px;
            background-color: #f8f9fa;
            margin-top: 8px;
        }
        .autocomplete-results {
            position: absolute;
            z-index: 1000;
            background: white;
            border: 1px solid #ccc;
            max-height: 200px;
            overflow-y: auto;
            width: calc(100% - 30px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .autocomplete-item {
            padding: 8px;
            cursor: pointer;
        }
        .autocomplete-item:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg kemenag-header navbar-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">
                <img src="../assets/Kementerian_Agama_new_logo.png" alt="Logo Kemenag" style="height: 40px; margin-right: 10px;">
                <i class="bi bi-arrow-left-circle me-2"></i>
                Kembali
            </a>
            <span class="navbar-text text-white fw-bold">
                Buat SK Cuti
            </span>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row">
            <!-- Form Section -->
            <div class="col-lg-5 mb-4">
                <div class="card card-form">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <div><i class="bi bi-file-earmark-text me-2"></i>Form SK Cuti</div>
                        <button class="btn btn-sm btn-outline-secondary d-none" id="btn-cancel-edit">Batal Edit</button>
                    </div>
                    <div class="card-body">
                        <form id="formSKCuti">
                            <input type="hidden" id="id_cuti">

                            <!-- Section 1 -->
                            <h6 class="fw-bold text-success border-bottom pb-2 mb-3">1. Nomor Surat Cuti</h6>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Nomor SK Cuti</label>
                                    <input type="text" class="form-control" id="cuti_nomor" placeholder="Loading..." required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Tanggal Pembuatan</label>
                                    <input type="date" class="form-control" id="cuti_createdate" required>
                                </div>
                            </div>

                            <!-- Section 2 -->
                            <h6 class="fw-bold text-success border-bottom pb-2 mb-3 mt-4">2. Data Pegawai</h6>
                            <div class="mb-3 position-relative">
                                <label class="form-label">Cari Nama Pegawai</label>
                                <input type="text" class="form-control" id="search_pegawai" placeholder="Ketik nama pegawai..." autocomplete="off">
                                <div class="autocomplete-results d-none" id="auto-pegawai"></div>
                            </div>
                            <div id="pegawai-info-box" class="pegawai-info d-none">
                                <div class="row g-2">
                                    <div class="col-md-6"><strong>Nama:</strong> <span id="display_nama">-</span></div>
                                    <div class="col-md-6"><strong>NIP:</strong> <span id="display_nip">-</span></div>
                                    <div class="col-md-6"><strong>Pangkat:</strong> <span id="display_pangkat">-</span></div>
                                    <div class="col-md-6"><strong>Golongan:</strong> <span id="display_golongan">-</span></div>
                                    <div class="col-12"><strong>Jabatan:</strong> <span id="display_jabatan">-</span></div>
                                </div>
                            </div>
                            <input type="hidden" id="pegawai_nama">
                            <input type="hidden" id="pegawai_nip">
                            <input type="hidden" id="pegawai_pangkat">
                            <input type="hidden" id="pegawai_golongan">
                            <input type="hidden" id="pegawai_jabatan">

                            <!-- Section 3 -->
                            <h6 class="fw-bold text-success border-bottom pb-2 mb-3 mt-4">3. Data Cuti</h6>
                            <div class="mb-3">
                                <label class="form-label">Alasan Cuti</label>
                                <input type="text" class="form-control" id="cuti_alasan" required>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Tanggal Awal Cuti</label>
                                    <input type="date" class="form-control" id="cuti_startdate" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Tanggal Akhir Cuti</label>
                                    <input type="date" class="form-control" id="cuti_enddate" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Lama Cuti (hari)</label>
                                <input type="number" class="form-control" id="cuti_daylong" required>
                            </div>
                            <div class="mb-3 position-relative">
                                <label class="form-label">Atasan Langsung</label>
                                <input type="text" class="form-control" id="search_atasan" placeholder="Ketik nama atasan..." autocomplete="off">
                                <div class="autocomplete-results d-none" id="auto-atasan"></div>
                            </div>
                            <div id="atasan-info-box" class="pegawai-info d-none mb-3">
                                <div class="row g-2">
                                    <div class="col-md-6"><strong>Nama:</strong> <span id="display_atasan_nama">-</span></div>
                                    <div class="col-md-6"><strong>NIP:</strong> <span id="display_atasan_nip">-</span></div>
                                </div>
                            </div>
                            <input type="hidden" id="atasan_nama">
                            <input type="hidden" id="atasan_nip">

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-kemenag btn-lg" id="btn-submit">
                                    <i class="bi bi-save me-2"></i>Simpan SK Cuti
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Table Section -->
            <div class="col-lg-7">
                <div class="card card-form h-100">
                    <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                        <div><i class="bi bi-table me-2"></i>Daftar SK Cuti</div>
                        <input type="text" id="global-search" class="form-control form-control-sm w-auto" placeholder="Cari data...">
                    </div>
                    <div class="card-body p-0">
                        <div id="table-sk-cuti"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>

    <!-- Page Logic -->
    <script src="sk_cuti.js"></script>
</body>

</html>
